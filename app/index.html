<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Capital Letter Counter</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1rem;
    }

    .card {
      background: #ffffff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      padding: 2rem;
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: #444;
      margin-bottom: 0.4rem;
    }

    textarea {
      width: 100%;
      height: 120px;
      padding: 0.6rem 0.75rem;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 5px;
      resize: vertical;
      transition: border-color 0.2s;
    }

    textarea:focus {
      outline: none;
      border-color: #0078d4;
    }

    button {
      display: block;
      width: 100%;
      margin-top: 1rem;
      padding: 0.65rem;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: #0078d4;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #005fa3;
    }

    .result {
      margin-top: 1.25rem;
      padding: 0.75rem 1rem;
      background: #e8f4fd;
      border-left: 4px solid #0078d4;
      border-radius: 4px;
      font-size: 1rem;
      color: #1a1a2e;
      display: none;
    }

    .result strong {
      font-size: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Capital Letter Counter</h1>
    <label for="inputText">Enter your text</label>
    <textarea id="inputText" placeholder="Type something here..."></textarea>
    <button id="submitBtn">Submit</button>
    <div class="result" id="result">
      Capital letters found: <strong id="count">0</strong>
    </div>
  </div>

  <script>
    document.getElementById("submitBtn").addEventListener("click", function () {
      var text = document.getElementById("inputText").value;
      var count = 0;

      for (var i = 0; i < text.length; i++) {
        var ch = text[i];
        if (ch >= "A" && ch <= "Z") {
          count++;
        }
      }

      document.getElementById("count").textContent = count;
      document.getElementById("result").style.display = "block";
    });
  </script>
</body>
</html>
